<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캣타워</title>
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5)),
            url(https://i.pinimg.com/1200x/19/af/47/19af47be0359100392816d9bf1f4dbed.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            
            position: relative;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        header {
            width: 100%;
            background-color: #000;
            box-shadow: 0 4px 10px rgba(223, 223, 223, 0.3);
            color: white;
            padding: 1.5rem 0;
            text-align: center;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 150px;
        }

        @keyframes rotateCat {
            0% { transform: rotate(360deg); }
        }

        .spin-cat {
            width: 200px;
            height: 200px;
            animation: rotateCat 1s linear infinite;
        }

        .text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff; 
            text-shadow: 0 0 20px #fff, 0 0 30px #007bff;
            margin-top: 2rem;
        }

        .section2 {
            padding: 5rem 0;
            display: flex;
            justify-content: center;
        }

        .box {
            background: white;
            border-radius: 40px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            padding: 3rem;
            width: 350px;
            text-align: center;
        }

        .cat-box {
            height: 300px; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        #target-cat {
            width: 150px;
            transition: width 0.3s ease;
        }

        .button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            background-color: #303030;
            color: #fff;
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .button:hover {
            transform: scale(1.05);
            background-color: #444;
        }
    </style>
</head>
<body>

    <header>
        <h1>캣타워</h1>
    </header>

    <div class="section">
        <img class="spin-cat" src="https://images.meme-arsenal.com/65c70fb9556ff7e1306291a51af1f44c.jpg" alt="회전하는 고양이">
        <p class="text">배고픈 고양이를 위해 아래에서 먹이를 주세요!</p>
        <p style="margin-top: 200px; color: #ffffff; text-shadow: 0 0 30px #fff, 0 0 30px #007bff;">(아래로 스크롤 ↓)</p>
    </div>

    <main class="section2">
        <div class="box">
            <div class="cat-box">
                <img id="target-cat" src="https://www.kindpng.com/picc/m/552-5524250_cats-cat-fat-fatcat-watermelon-watermeloncat-roundest-cat.png" alt="먹이 먹을 고양이">
            </div>
            <h3>밥을 주면 고양이가 커집니다!</h3>
            <button class="button" onclick="feedCat()">밥 주기 🍖</button>
        </div>
    </main>

    <script>
        let currentSize = 150;
        const catImage = document.getElementById('target-cat');

        function feedCat() {
            currentSize += 50;
            catImage.style.width = currentSize + 'px';
            
            if(currentSize > 600) {
                alert("고양이는 배가 부릅니다.");
                currentSize = 150;
                catImage.style.width = currentSize + 'px';
            }
        }
    </script>
</body>
</html>
