<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
      
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000000;
            font-family: sans-serif;
            color: white;
        }

      
        .card {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 300px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        .link-button {
            display: block;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 12px 20px;
            margin: 10px 0;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .link-button:hover {
            background-color: #cccccc;
            transform: translateY(-2px);
        }

        .link-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>web</h1>
        <a href="https://github.com" class="link-button" target="_blank">Cat</a>
    </div>

</body>
</html>
